name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        shell: cmd
        run: build_quick.bat

      - name: Create release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item bin\stadia-vigem-x64.exe release\
          Copy-Item Install.ps1 release\
          Copy-Item README.md release\
          Compress-Archive -Path release\* -DestinationPath StadiaViGEm-win64.zip

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/stadia-vigem-x64.exe
            Install.ps1
            README.md
            StadiaViGEm-win64.zip
          generate_release_notes: true
