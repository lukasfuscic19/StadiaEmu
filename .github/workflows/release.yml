name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build and package
        shell: pwsh
        run: |
          cmd /c build_quick.bat
          ./package_release.ps1

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/stadia-vigem-x64.exe
            release/StadiaViGEm-Setup-x64.exe
            release/StadiaViGEm-Portable-win64.zip
            Install.ps1
            README.md
          generate_release_notes: true
